<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Saw Mill Calculations</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      .alert label {
        font-size: 22px;
      }
      .radio-box-label {
        cursor: pointer;
        display: inline-block;
        position: relative;
      }
      .radio-box-input {
        display: none;
      }
      .radio-box-span {
        display: inline-block;
        padding: 0 6px;
        border-radius: 10px;
        background: #ff9800;
        color: #000;
        transition: background 0.2s, color 0.2s;
      }
      .radio-box-input:checked + .radio-box-span {
        background: #000;
        color: #fff;
        border-color: #000;
      }
      .kali-box {
        background: #000;
        color: #fff;
        padding: 4px 10px;
        border-radius: 5px;
        font-size: 20px;
        font-weight: 700;
      }
    </style>
    <script defer="defer" src="/SawMill/static/js/main.c551f2e5.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
